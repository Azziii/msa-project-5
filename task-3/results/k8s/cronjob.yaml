apiVersion: batch/v1
kind: CronJob
metadata:
  name: shipments-export
  namespace: logistics
spec:
  schedule: "0 20 * * *"

  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never

          containers:
            - name: exporter
              image: shipments-export:latest
              imagePullPolicy: Never

              envFrom:
                - secretRef:
                    name: postgres-secret

              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"